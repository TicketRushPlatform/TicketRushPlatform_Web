```yaml id="p4x8qm"
name: CICD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_OWNER: ticketrushplatform
  IMAGE_NAME: ticketrush-web

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: ESLint
        run: |
          npm run lint

      - name: Type check
        run: |
          npx tsc --noEmit

      - name: Build check
        run: |
          npm run build

  build-and-push:
    needs:
      - quality-check

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE=ghcr.io/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

          echo "Using image: $IMAGE"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image }} \
            -t ghcr.io/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.image }}

          docker push ghcr.io/${{ env.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs:
      - build-and-push

    if: github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            IMAGE=${{ needs.build-and-push.outputs.image }}

            echo "Deploying $IMAGE"

            docker login ghcr.io \
              -u ${{ github.actor }} \
              -p ${{ secrets.GHCR_PAT }}

            cd ${{ secrets.DEPLOY_PATH }}

            export WEB_TAG=${{ github.sha }}

            docker pull $IMAGE

            docker compose pull web

            docker compose up -d web
```
